<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Provision LMS - Learning Management System</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4361ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Provision LMS">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <div class="login-logo">LMS</div>
      <h2>Student Learning Management System</h2>
      <div class="login-form">
        <input type="email" id="loginEmail" placeholder="Email" value="admin@lms.com">
        <input type="password" id="loginPassword" placeholder="Password" value="admin123">
        <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
        <div class="login-links">
          <a href="#" onclick="showRegister()">Create Account</a>
        </div>
        <div id="loginError" class="error-msg"></div>
      </div>
    </div>
  </div>

  <div id="registerOverlay" class="login-overlay" style="display:none">
    <div class="login-box">
      <div class="login-logo">LMS</div>
      <h2>Create Student Account</h2>
      <div class="login-form">
        <input type="text" id="regFirst" placeholder="First Name">
        <input type="text" id="regLast" placeholder="Last Name">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">
        <input type="tel" id="regPhone" placeholder="Phone (optional)">
        <button class="btn btn-primary" onclick="doRegister()">Register</button>
        <div class="login-links">
          <a href="#" onclick="showLogin()">Already have an account? Sign In</a>
        </div>
        <div id="regError" class="error-msg"></div>
      </div>
    </div>
  </div>

  <div id="mainApp" style="display:none">
    <nav class="topnav" id="topnav"></nav>
    <div class="main-content" id="mainContent"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = '';
let currentUser = null;
let navItems = [];

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || 'success');
  setTimeout(() => t.className = 'toast', 3000);
}

// ===== AUTH =====
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPassword').value;
  try {
    const res = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pw }) });
    const data = await res.json();
    if (data.error) { document.getElementById('loginError').textContent = data.error; return; }
    currentUser = data;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } catch(e) { document.getElementById('loginError').textContent = 'Connection error'; }
}

async function doRegister() {
  const data = {
    first_name: document.getElementById('regFirst').value,
    last_name: document.getElementById('regLast').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPassword').value,
    phone: document.getElementById('regPhone').value
  };
  try {
    const res = await fetch(API + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const r = await res.json();
    if (r.error) { document.getElementById('regError').textContent = r.error; return; }
    currentUser = r;
    document.getElementById('registerOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } catch(e) { document.getElementById('regError').textContent = 'Connection error'; }
}

function showRegister() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('registerOverlay').style.display = 'flex'; }
function showLogin() { document.getElementById('registerOverlay').style.display = 'none'; document.getElementById('loginOverlay').style.display = 'flex'; }

function logout() { currentUser = null; document.getElementById('mainApp').style.display = 'none'; document.getElementById('loginOverlay').style.display = 'flex'; }

// ===== APP INIT =====
function initApp() {
  if (currentUser && currentUser.role === 'student') {
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') { e.preventDefault(); return false; }
      if (e.key === 'c' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
      if (e.key === 'u' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
      if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
      if (e.key === 'i' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
      if (e.key === 'j' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
      if (e.key === 'p' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
    });
  }
  if (currentUser.role === 'admin' || currentUser.role === 'instructor') {
    navItems = [
      { id: 'dashboard', label: 'Dashboard', icon: '&#9632;' },
      { id: 'courses', label: 'Courses', icon: '&#9654;' },
      { id: 'categories', label: 'Categories', icon: '&#9776;' },
      { id: 'quizzes', label: 'Quizzes', icon: '&#9998;' },
      { id: 'students', label: 'Students', icon: '&#9787;' },
      { id: 'enrollments', label: 'Enrollments', icon: '&#9733;' },
      { id: 'invoices', label: 'Invoices', icon: '&#128179;' },
      { id: 'report-enrollments', label: 'Enroll Report', icon: '&#9783;' },
      { id: 'report-dues', label: 'Dues Report', icon: '&#9878;' },
      { id: 'account', label: currentUser.first_name, icon: '&#9881;' }
    ];
  } else {
    const allowed = currentUser.page_access && currentUser.page_access !== '*' ? currentUser.page_access.split(',') : null;
    const allStudentPages = [
      { id: 'my-courses', label: 'My Courses', icon: '&#9654;' },
      { id: 'catalog', label: 'Browse Catalog', icon: '&#9776;' },
      { id: 'my-quizzes', label: 'My Quizzes', icon: '&#9998;' },
      { id: 'my-invoices', label: 'My Invoices', icon: '&#128179;' },
      { id: 'account', label: currentUser.first_name, icon: '&#9881;' }
    ];
    navItems = allowed ? allStudentPages.filter(p => allowed.includes(p.id)) : allStudentPages;
    if (!navItems.find(p => p.id === 'account')) navItems.push({ id: 'account', label: currentUser.first_name, icon: '&#9881;' });
  }
  renderNav();
  showPage(navItems[0].id);
}

function renderNav() {
  const nav = document.getElementById('topnav');
  const showInstall = currentUser && currentUser.role === 'student';
  nav.innerHTML = (showInstall ? `<button id="installBtn" onclick="installApp()" style="background:#4361ee;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;align-self:center">&#11015; Install App</button>` : '') + navItems.map(n => `<a class="nav-link" data-page="${n.id}" onclick="showPage('${n.id}')">${n.icon} ${n.label}</a>`).join('') + `<a class="nav-link nav-right" onclick="logout()">Logout</a>`;
}

function showPage(pageId) {
  if (typeof cleanupYtRestrictions === 'function') cleanupYtRestrictions();
  if (currentUser && currentUser.role === 'student' && currentUser.page_access && currentUser.page_access !== '*') {
    const allowed = currentUser.page_access.split(',');
    const subPages = {
      'course-detail': ['my-courses', 'catalog'],
      'lesson-player': ['my-courses'],
      'youtube-player': ['my-courses', 'catalog'],
      'take-quiz': ['my-quizzes'],
      'quiz-results': ['my-quizzes'],
      'onboarding': ['my-courses', 'catalog', 'my-quizzes', 'my-invoices', 'account']
    };
    if (subPages[pageId]) {
      const parents = subPages[pageId];
      if (!parents.some(p => allowed.includes(p))) {
        showToast('Access denied', 'error'); return;
      }
    } else if (!allowed.includes(pageId) && pageId !== 'logout') {
      showToast('Access denied', 'error'); return;
    }
  }
  document.querySelectorAll('.nav-link').forEach(n => n.classList.toggle('active', n.dataset.page === pageId));
  const content = document.getElementById('mainContent');
  switch(pageId) {
    case 'dashboard': renderAdminDashboard(content); break;
    case 'courses': renderAdminCourses(content); break;
    case 'categories': renderCategories(content); break;
    case 'quizzes': renderAdminQuizzes(content); break;
    case 'students': renderStudents(content); break;
    case 'enrollments': renderEnrollments(content); break;
    case 'report-enrollments': renderEnrollmentReport(content); break;
    case 'report-dues': renderDuesReport(content); break;
    case 'my-courses': renderMyCourses(content); break;
    case 'catalog': renderCatalog(content); break;
    case 'my-quizzes': renderMyQuizzes(content); break;
    case 'invoices': renderInvoices(content); break;
    case 'my-invoices': renderMyInvoices(content); break;
    case 'account': renderAccount(content); break;
    case 'course-detail': renderCourseDetail(content); break;
    case 'onboarding': renderOnboarding(content); break;
    case 'lesson-player': renderLessonPlayer(content); break;
    case 'youtube-player': renderYouTubePlayer(content); break;
    case 'take-quiz': renderTakeQuiz(content); break;
    case 'quiz-results': renderQuizResults(content); break;
    default: content.innerHTML = '<p>Page not found</p>';
  }
}

let _pageData = {};
let ytCurTime = 0, ytTotalDur = 0, ytIsPlaying = false;

// ===== ADMIN DASHBOARD =====
async function renderAdminDashboard(el) {
  el.innerHTML = '<div class="loading">Loading dashboard...</div>';
  const stats = await (await fetch(API + '/api/stats')).json();
  el.innerHTML = `
    <h2 class="page-title">Admin Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card" style="border-left:4px solid #1a237e"><div class="stat-num">${stats.totalStudents}</div><div class="stat-label">Students</div></div>
      <div class="stat-card" style="border-left:4px solid #2e7d32"><div class="stat-num">${stats.totalCourses}</div><div class="stat-label">Courses</div></div>
      <div class="stat-card" style="border-left:4px solid #e65100"><div class="stat-num">${stats.totalVideos}</div><div class="stat-label">Videos</div></div>
      <div class="stat-card" style="border-left:4px solid #7b1fa2"><div class="stat-num">${stats.totalEnrollments}</div><div class="stat-label">Enrollments</div></div>
      <div class="stat-card" style="border-left:4px solid #00838f"><div class="stat-num">${stats.totalQuizzes}</div><div class="stat-label">Quizzes</div></div>
    </div>
    <div class="grid-2" style="margin-top:16px">
      <div class="card">
        <div class="card-header">Recent Enrollments</div>
        <div class="card-body">
          ${stats.recentEnrollments.length ? stats.recentEnrollments.map(e => `<div class="list-item"><b>${e.student_name}</b> enrolled in <b>${e.course_title}</b><span class="muted">${e.enrolled_at}</span></div>`).join('') : '<p class="muted">No enrollments yet</p>'}
        </div>
      </div>
      <div class="card">
        <div class="card-header">Top Courses</div>
        <div class="card-body">
          ${stats.topCourses.length ? stats.topCourses.map(c => `<div class="list-item"><b>${c.title}</b><span class="badge">${c.enrolled_count} students</span></div>`).join('') : '<p class="muted">No published courses yet</p>'}
        </div>
      </div>
    </div>`;
}

// ===== COURSES (Admin) =====
let _courses = [];
async function renderAdminCourses(el) {
  el.innerHTML = '<div class="loading">Loading courses...</div>';
  const categories = await (await fetch(API + '/api/categories')).json();
  _courses = await (await fetch(API + '/api/courses')).json();
  el.innerHTML = `
    <div class="page-header"><h2 class="page-title">Course Management</h2><button class="btn btn-primary" onclick="showNewCourse()">+ New Course</button></div>
    <div id="courseFormArea"></div>
    <table class="data-table">
      <thead><tr><th>Title</th><th>Category</th><th>Fee</th><th>Difficulty</th><th>Lessons</th><th>Students</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${_courses.map(c => `<tr>
        <td><a href="#" onclick="viewCourse('${c.course_id}')">${c.title}</a></td>
        <td>${c.category_name || '-'}</td>
        <td><b>$${(c.course_fee || 0).toFixed(2)}</b></td>
        <td><span class="badge badge-${c.difficulty}">${c.difficulty}</span></td>
        <td>${c.lesson_count}</td>
        <td>${c.enrolled_count}</td>
        <td><span class="status-badge status-${c.status}">${c.status}</span></td>
        <td><button class="btn btn-sm" onclick="editCourse('${c.course_id}')">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteCourse('${c.course_id}')">Del</button></td>
      </tr>`).join('')}</tbody>
    </table>`;
}

let _categories = [];
async function showNewCourse() {
  _categories = await (await fetch(API + '/api/categories')).json();
  const instructors = await (await fetch(API + '/api/users')).json();
  const instList = instructors.filter(u => u.role === 'instructor' || u.role === 'admin');
  document.getElementById('courseFormArea').innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">New Course</div>
      <div class="card-body">
        <div class="form-grid-3">
          <div class="form-group"><label>Title *</label><input id="crsTitle"></div>
          <div class="form-group"><label>Category</label><select id="crsCategory">${_categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
          <div class="form-group"><label>Instructor</label><select id="crsInstructor">${instList.map(i => `<option value="${i.id}">${i.first_name} ${i.last_name}</option>`).join('')}</select></div>
          <div class="form-group"><label>Description</label><textarea id="crsDesc" rows="2"></textarea></div>
          <div class="form-group"><label>Difficulty</label><select id="crsDifficulty"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
          <div class="form-group"><label>Duration (hrs)</label><input type="number" id="crsDuration" value="0"></div>
          <div class="form-group"><label>Course Fee ($)</label><input type="number" id="crsFee" value="0" step="0.01"></div>
        </div>
        <button class="btn btn-primary" onclick="saveNewCourse()">Create Course</button>
        <button class="btn" onclick="document.getElementById('courseFormArea').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}

async function saveNewCourse() {
  const data = { title: document.getElementById('crsTitle').value, description: document.getElementById('crsDesc').value, category_id: document.getElementById('crsCategory').value, instructor_id: document.getElementById('crsInstructor').value, difficulty: document.getElementById('crsDifficulty').value, duration_hours: document.getElementById('crsDuration').value, course_fee: document.getElementById('crsFee').value, status: 'published' };
  if (!data.title) { showToast('Title required', 'error'); return; }
  await fetch(API + '/api/courses', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  showToast('Course created');
  renderAdminCourses(document.getElementById('mainContent'));
}

async function deleteCourse(courseId) {
  if (!confirm('Archive this course?')) return;
  await fetch(API + '/api/courses/' + courseId, { method: 'DELETE' });
  showToast('Course archived');
  renderAdminCourses(document.getElementById('mainContent'));
}

async function editCourse(courseId) {
  const course = await (await fetch(API + '/api/courses/' + courseId)).json();
  const categories = await (await fetch(API + '/api/categories')).json();
  const instructors = (await (await fetch(API + '/api/users')).json()).filter(u => u.role === 'instructor' || u.role === 'admin');
  document.getElementById('courseFormArea').innerHTML = `
    <div class="card" style="margin-bottom:12px;border:2px solid #1a237e">
      <div class="card-header" style="background:#1a237e;color:#fff">Edit Course: ${course.title}</div>
      <div class="card-body">
        <div class="form-grid-3">
          <div class="form-group"><label>Title *</label><input id="edCrsTitle" value="${course.title}"></div>
          <div class="form-group"><label>Category</label><select id="edCrsCategory">${categories.map(c => `<option value="${c.id}" ${c.id == course.category_id ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
          <div class="form-group"><label>Instructor</label><select id="edCrsInstructor">${instructors.map(i => `<option value="${i.id}" ${i.id == course.instructor_id ? 'selected' : ''}>${i.first_name} ${i.last_name}</option>`).join('')}</select></div>
          <div class="form-group"><label>Description</label><textarea id="edCrsDesc" rows="2">${course.description || ''}</textarea></div>
          <div class="form-group"><label>Difficulty</label><select id="edCrsDifficulty"><option value="beginner" ${course.difficulty==='beginner'?'selected':''}>Beginner</option><option value="intermediate" ${course.difficulty==='intermediate'?'selected':''}>Intermediate</option><option value="advanced" ${course.difficulty==='advanced'?'selected':''}>Advanced</option></select></div>
          <div class="form-group"><label>Duration (hrs)</label><input type="number" id="edCrsDuration" value="${course.duration_hours || 0}"></div>
          <div class="form-group"><label>Course Fee ($)</label><input type="number" id="edCrsFee" value="${course.course_fee || 0}" step="0.01"></div>
          <div class="form-group"><label>Status</label><select id="edCrsStatus"><option value="published" ${course.status==='published'?'selected':''}>Published</option><option value="draft" ${course.status==='draft'?'selected':''}>Draft</option><option value="archived" ${course.status==='archived'?'selected':''}>Archived</option></select></div>
        </div>
        <button class="btn btn-primary" onclick="saveEditCourse('${courseId}')">Save Changes</button>
        <button class="btn" onclick="document.getElementById('courseFormArea').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}

async function saveEditCourse(courseId) {
  const data = {
    title: document.getElementById('edCrsTitle').value,
    description: document.getElementById('edCrsDesc').value,
    category_id: document.getElementById('edCrsCategory').value,
    instructor_id: document.getElementById('edCrsInstructor').value,
    difficulty: document.getElementById('edCrsDifficulty').value,
    duration_hours: document.getElementById('edCrsDuration').value,
    course_fee: document.getElementById('edCrsFee').value,
    status: document.getElementById('edCrsStatus').value
  };
  if (!data.title) { showToast('Title required', 'error'); return; }
  await fetch(API + '/api/courses/' + courseId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  showToast('Course updated');
  renderAdminCourses(document.getElementById('mainContent'));
}

// ===== COURSE DETAIL =====
async function viewCourse(courseId) {
  _pageData.courseId = courseId;
  showPage('course-detail');
}

async function renderCourseDetail(el) {
  const courseId = _pageData.courseId;
  el.innerHTML = '<div class="loading">Loading course...</div>';
  const course = await (await fetch(API + '/api/courses/' + courseId)).json();
  const isTeacher = currentUser.role === 'admin' || currentUser.role === 'instructor';
  el.innerHTML = `
    <div class="page-header">
      <h2 class="page-title">${course.title}</h2>
      <div><span class="badge badge-${course.difficulty}">${course.difficulty}</span> <span class="status-badge status-${course.status}">${course.status}</span></div>
    </div>
    <p class="muted">${course.description || 'No description'}</p>
    <p><b>Instructor:</b> ${course.instructor_name || 'N/A'} | <b>Category:</b> ${course.category_name || 'N/A'} | <b>Duration:</b> ${course.duration_hours}h</p>
    ${isTeacher ? `<div style="margin:8px 0"><button class="btn btn-primary btn-sm" onclick="showAddLesson('${courseId}')">+ Add Lesson</button> <button class="btn btn-sm" onclick="showAddQuiz('${courseId}')">+ Add Quiz</button></div>` : ''}
    <div id="lessonFormArea"></div>
    <div id="quizFormArea"></div>
    <div class="card" style="margin-top:12px">
      <div class="card-header">Lessons (${course.lessons.length})</div>
      <div class="card-body">
        ${course.lessons.length ? course.lessons.map((l, i) => `
          <div class="lesson-block">
            <div class="lesson-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <div class="lesson-num">${i + 1}</div>
              <div class="lesson-info">
                <b>${l.title}</b>
                <span class="muted">${l.description || ''} | ${l.videos.length} video(s) | ${l.duration_minutes} min</span>
                ${l.batches && l.batches.length ? '<span class="muted">' + l.batches.map(b => '<span class="batch-tag">' + b.batch_name + ' (' + b.video_count + ')</span>').join(' ') + '</span>' : ''}
              </div>
              <div class="lesson-actions">
                ${isTeacher ? `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();showAddYouTubeLink('${l.lesson_id}','${courseId}',${(l.batches && l.batches.length ? l.batches.length : 0) + 1})">&#128279; Add YouTube Link</button>` : ''}
                ${isTeacher ? `<button class="btn btn-sm" onclick="event.stopPropagation();showBatchUpload('${l.lesson_id}','${courseId}',${(l.batches && l.batches.length ? l.batches.length : 0) + 1})">&#8682; Batch Upload</button>` : ''}
                ${isTeacher ? `<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteLesson('${l.lesson_id}','${courseId}')">Del</button>` : ''}
                <span class="expand-arrow">&#9660;</span>
              </div>
            </div>
            <div class="lesson-body">
              ${(l.links && l.links.length) || (l.videos && l.videos.length) ? '' : '<p class="muted" style="padding:8px">No content yet. Use buttons above to add YouTube links or upload videos.</p>'}
              ${l.links && l.links.length ? (() => {
                const grouped = {};
                l.links.forEach(lnk => {
                  const bn = lnk.batch_number || 1;
                  if (!grouped[bn]) grouped[bn] = [];
                  grouped[bn].push(lnk);
                });
                const safeTitle = (t) => t.replace(/'/g, '').replace(/"/g, '');
                return Object.keys(grouped).map(bn => {

function showBatchUpload(lessonId, courseId, nextBatchNum) {
  document.getElementById('lessonFormArea').innerHTML = `
    <div class="card" style="margin-bottom:8px;border:2px solid #1a237e">
      <div class="card-header" style="background:#1a237e;color:#fff">&#8682; Batch Video Upload</div>
      <div class="card-body">
        <div class="form-grid-3">
          <div class="form-group"><label>Batch Number *</label><input type="number" id="batchNum" value="${nextBatchNum}" min="1"></div>
          <div class="form-group"><label>Batch Name *</label><input id="batchName" value="Batch ${nextBatchNum}" placeholder="e.g. Batch 1 - Introduction"></div>
          <div class="form-group"><label>Video Title Prefix (optional)</label><input id="batchTitlePrefix" placeholder="e.g. Lecture"></div>
        </div>
        <div class="form-group" style="margin-top:8px">
          <label>Select Video Files (select multiple)</label>
          <input type="file" id="batchFiles" multiple accept="video/*" style="padding:6px;border:2px dashed #1a237e;border-radius:6px;width:100%;background:#f8f9ff">
          <div id="batchFileList" class="muted" style="margin-top:4px"></div>
        </div>
        <div style="margin-top:8px">
          <button class="btn btn-primary" onclick="doBatchUpload('${lessonId}','${courseId}')">Upload All Videos</button>
          <button class="btn" onclick="document.getElementById('lessonFormArea').innerHTML=''">Cancel</button>
        </div>
        <div id="batchUploadProgress" style="margin-top:8px"></div>
      </div>
    </div>`;
  document.getElementById('batchFiles').addEventListener('change', function() {
    var files = this.files;
    var list = '';
    for (var i = 0; i < files.length; i++) {
      var sizeMB = (files[i].size / (1024 * 1024)).toFixed(1);
      list += '<div style="font-size:11px;padding:2px 0">' + (i + 1) + '. ' + files[i].name + ' <span class="muted">(' + sizeMB + ' MB)</span></div>';
    }
    document.getElementById('batchFileList').innerHTML = '<b>' + files.length + ' file(s) selected:</b>' + list;
  });
}

async function doBatchUpload(lessonId, courseId) {
  var files = document.getElementById('batchFiles').files;
  if (!files.length) { showToast('Select video files first', 'error'); return; }
  var batchNum = document.getElementById('batchNum').value;
  var batchNm = document.getElementById('batchName').value;
  var titlePrefix = document.getElementById('batchTitlePrefix').value;
  var progress = document.getElementById('batchUploadProgress');
  progress.innerHTML = '<div style="color:#1976d2">Uploading ' + files.length + ' video(s) to ' + batchNm + '... Please wait</div>';
  var formData = new FormData();
  for (var i = 0; i < files.length; i++) {
    formData.append('videos', files[i]);
  }
  formData.append('lesson_id', lessonId);
  formData.append('batch_number', batchNum);
  formData.append('batch_name', batchNm);
  if (titlePrefix) formData.append('title', titlePrefix);
  try {
    var res = await fetch(API + '/api/videos/upload', { method: 'POST', body: formData });
    var data = await res.json();
    if (data.error) { progress.innerHTML = '<div style="color:#c62828">Error: ' + data.error + '</div>'; return; }
    progress.innerHTML = '<div style="background:#e8f5e9;border:1px solid #4caf50;border-radius:4px;padding:8px"><b style="color:#2e7d32">&#10003; ' + data.message + '</b></div>';
    showToast(data.count + ' video(s) uploaded');
    setTimeout(() => viewCourse(courseId), 1500);
  } catch(e) {
    progress.innerHTML = '<div style="color:#c62828">Upload failed: ' + e.message + '</div>';
  }
}

async function deleteBatch(batchId, courseId) {
  if (!confirm('Delete entire batch and all its videos?')) return;
  var res = await fetch(API + '/api/batches/' + batchId, { method: 'DELETE' });
  var data = await res.json();
  showToast(data.message);
  viewCourse(courseId);
}

function showAddYouTubeLink(lessonId, courseId, nextBatchNum) {
  document.getElementById('lessonFormArea').innerHTML = `
    <div class="card" style="margin-bottom:8px;border:2px solid #c62828">
      <div class="card-header" style="background:#c62828;color:#fff">&#128279; Add YouTube Video Link</div>
      <div class="card-body">
        <div class="form-grid-3">
          <div class="form-group"><label>Batch Number *</label><input type="number" id="ytBatchNum" value="${nextBatchNum}" min="1"></div>
          <div class="form-group"><label>Video Title *</label><input id="ytTitle" placeholder="e.g. Lecture 1 - Introduction"></div>
          <div class="form-group"><label>Duration (optional)</label><input id="ytDuration" placeholder="e.g. 45:30"></div>
        </div>
        <div class="form-group" style="margin-top:8px">
          <label>Description</label>
          <input id="ytDescription" placeholder="Brief description of this video" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;font-size:11px">
        </div>
        <div class="form-group" style="margin-top:8px">
          <label>YouTube URL or Video ID *</label>
          <input id="ytUrl" placeholder="https://www.youtube.com/watch?v=... or youtu.be/... or just video ID" style="width:100%;padding:6px;border:2px solid #c62828;border-radius:4px;font-size:11px">
        </div>
        <div id="ytPreview" style="margin-top:8px"></div>
        <div style="margin-top:8px">
          <button class="btn btn-success" onclick="saveYouTubeLink('${lessonId}','${courseId}')">Add Link</button>
          <button class="btn" onclick="document.getElementById('lessonFormArea').innerHTML=''">Cancel</button>
        </div>
      </div>
    </div>`;
  document.getElementById('ytUrl').addEventListener('input', function() {
    const val = this.value;
    const patterns = [/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/, /youtu\.be\/([a-zA-Z0-9_-]{11})/, /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/, /^([a-zA-Z0-9_-]{11})$/];
    let ytId = null;
    for (const p of patterns) { const m = val.match(p); if (m) { ytId = m[1]; break; } }
    if (ytId) {
      document.getElementById('ytPreview').innerHTML = '<div style="background:#e8f5e9;border:1px solid #4caf50;border-radius:4px;padding:8px"><b style="color:#2e7d32">&#10003; Valid YouTube ID:</b> ' + ytId + '<br><iframe width="280" height="157" src="https://www.youtube.com/embed/' + ytId + '" frameborder="0" allowfullscreen style="margin-top:6px;border-radius:4px"></iframe></div>';
    } else if (val.length > 5) {
      document.getElementById('ytPreview').innerHTML = '<div style="color:#ff9800;font-size:11px">&#9888; Paste a valid YouTube URL or 11-character video ID</div>';
    } else {
      document.getElementById('ytPreview').innerHTML = '';
    }
  });
}

async function saveYouTubeLink(lessonId, courseId) {
  const title = document.getElementById('ytTitle').value.trim();
  const url = document.getElementById('ytUrl').value.trim();
  const batchNum = parseInt(document.getElementById('ytBatchNum').value) || 1;
  const duration = document.getElementById('ytDuration').value.trim();
  const description = document.getElementById('ytDescription') ? document.getElementById('ytDescription').value.trim() : '';
  if (!title) { showToast('Title required', 'error'); return; }
  if (!url) { showToast('YouTube URL required', 'error'); return; }
  const res = await fetch(API + '/api/batch-links', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lesson_id: lessonId, batch_number: batchNum, title, youtube_url: url, duration, description }) });
  const data = await res.json();
  if (data.error) { showToast(data.error, 'error'); return; }
  document.getElementById('ytUrl').value = '';
  document.getElementById('ytTitle').value = '';
  document.getElementById('ytDuration').value = '';
  document.getElementById('ytPreview').innerHTML = '<div style="background:#e8f5e9;border:1px solid #4caf50;border-radius:4px;padding:8px;font-size:11px"><b style="color:#2e7d32">&#10003; Link added successfully!</b> Video ID: <code>' + data.youtube_id + '</code> — Playback only, no download.</div>';
  showToast('YouTube link added');
  viewCourse(courseId);
}

async function renderYouTubePlayer(el) {
  const yid = _pageData.youtubeId;
  const isTeacher = currentUser.role === 'admin' || currentUser.role === 'instructor';
  el.innerHTML = `
    <div class="page-header">
      <button class="btn btn-sm" onclick="viewCourse('${_pageData.courseId}')">&larr; Back to Course</button>
      <h3>${_pageData.youtubeTitle || 'YouTube Video'}</h3>
    </div>
    <div class="yt-restricted-player" style="position:relative;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);background:#000">
      <div id="ytPlayerWrapper" style="position:relative;padding-bottom:50%;height:0;overflow:hidden">
        <iframe id="ytFrame" src="https://www.youtube.com/embed/${yid}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&controls=1&disablekb=1&fs=0&playsinline=1&cc_load_policy=0&origin=${encodeURIComponent(location.origin)}" style="position:absolute;top:-5%;left:0;width:100%;height:112%;border:0" allow="autoplay; encrypted-media; gyroscope"></iframe>
        <div style="position:absolute;top:0;left:0;right:0;height:6px;background:#c62828;z-index:11;pointer-events:none"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:16%;background:#000;z-index:11;pointer-events:none"></div>
        <div style="position:absolute;top:0;left:0;right:0;height:8%;background:#000;z-index:11;pointer-events:none"></div>
      </div>
      <div style="background:#1a1a1a;padding:8px 12px;display:flex;align-items:center;gap:8px;justify-content:center">
        <button onclick="ytPlayerCmd('seekTo',[Math.max(0,(ytCurTime||0)-10),true])" style="background:#333;color:#fff;border:none;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px" title="Rewind 10s">&#8634; 10s</button>
        <button id="ytPlayBtn" onclick="ytPlayerTogglePlay()" style="background:#1a237e;color:#fff;border:none;border-radius:4px;padding:5px 16px;cursor:pointer;font-size:12px;font-weight:600">&#9654; Play</button>
        <button onclick="ytPlayerCmd('seekTo',[(ytCurTime||0)+10,true])" style="background:#333;color:#fff;border:none;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px" title="Forward 10s">10s &#8635;</button>
        <span id="ytTimeLabel" style="color:#aaa;font-size:11px;margin-left:6px">0:00 / 0:00</span>
      </div>
      <div style="background:#111;padding:4px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:#888;font-size:10px">&#128274; Protected Content</span>
        <span style="color:#666;font-size:10px">&#9654; Stream Only</span>
      </div>
    </div>`;

  ytCurTime = 0; ytTotalDur = 0; ytIsPlaying = false;

  function ytPostMsg(func, args) {
    const f = document.getElementById('ytFrame');
    if (f && f.contentWindow) f.contentWindow.postMessage(JSON.stringify({ event: 'command', func: func, args: args || [] }), '*');
  }
  window.ytPlayerCmd = ytPostMsg;

  window.ytPlayerTogglePlay = function() {
    if (ytIsPlaying) ytPostMsg('pauseVideo'); else ytPostMsg('playVideo');
  };

  function updateYtPlayBtn() {
    const btn = document.getElementById('ytPlayBtn');
    if (btn) btn.innerHTML = ytIsPlaying ? '&#10074;&#10074; Pause' : '&#9654; Play';
  }
  function updateYtTimeLabel() {
    const tl = document.getElementById('ytTimeLabel');
    if (tl && ytTotalDur > 0) tl.textContent = fmtTime(ytCurTime) + ' / ' + fmtTime(ytTotalDur);
  }
  function fmtTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

  window.addEventListener('message', window._ytPlayerMsg = (e) => {
    try {
      const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      if (d.event === 'infoDelivery' && d.info) {
        if (d.info.duration) ytTotalDur = d.info.duration;
        if (d.info.currentTime !== undefined) ytCurTime = d.info.currentTime;
        if (d.info.playerState === 1) { ytIsPlaying = true; updateYtPlayBtn(); }
        if (d.info.playerState === 2) { ytIsPlaying = false; updateYtPlayBtn(); }
        if (d.info.playerState === 0) { ytIsPlaying = false; updateYtPlayBtn(); }
        updateYtTimeLabel();
      }
    } catch(e) {}
  });

  setTimeout(() => {
    const f = document.getElementById('ytFrame');
    if (f && f.contentWindow) {
      f.contentWindow.postMessage(JSON.stringify({ event: 'listening', id: 'ytFrame' }), '*');
    }
  }, 1000);

  setTimeout(() => { _pageData.youtubeId = null; }, 1000);

  document.addEventListener('contextmenu', window._ytBlockCtx = (e) => { e.preventDefault(); return false; });
  document.addEventListener('keydown', window._ytBlockKey = (e) => {
    if (e.key === 'c' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
    if (e.key === 'u' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
    if (e.key === 'i' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }
    if (e.key === 'F12') { e.preventDefault(); return false; }
  });
}

function cleanupYtRestrictions() {
  if (window._ytBlockCtx) document.removeEventListener('contextmenu', window._ytBlockCtx);
  if (window._ytBlockKey) document.removeEventListener('keydown', window._ytBlockKey);
}

let _currentQuiz = null;
let _quizAnswers = {};
let _quizTimer = null;

async function renderTakeQuiz(el) {
  _currentQuiz = await (await fetch(API + '/api/quizzes/' + _pageData.quizId)).json();
  _quizAnswers = {};
  let timeLeft = _currentQuiz.time_limit_minutes * 60;
  el.innerHTML = `
    <div class="page-header">
      <button class="btn btn-sm" onclick="viewCourse('${_pageData.courseId}')">&larr; Back</button>
      <h3>${_currentQuiz.title}</h3>
      <div id="quizTimer" class="quiz-timer">Time: ${_currentQuiz.time_limit_minutes}:00</div>
    </div>
    <div id="quizQuestions">
      ${_currentQuiz.questions.map((q, i) => `
        <div class="quiz-q">
          <div class="quiz-q-num">Q${i + 1} (${q.points} pt${q.points > 1 ? 's' : ''})</div>
          <div class="quiz-q-text">${q.question_text}</div>
          <div class="quiz-options">
            ${['A', 'B', 'C', 'D'].map(opt => `
              <label class="quiz-opt"><input type="radio" name="qq_${q.id}" value="${opt}" onchange="_quizAnswers[${q.id}]='${opt}'"> <b>${opt}.</b> ${q['option_' + opt.toLowerCase()] || ''}</label>
            `).join('')}
          </div>
        </div>`).join('')}
    </div>
    <button class="btn btn-primary" onclick="submitQuiz()" style="margin-top:12px">Submit Quiz</button>`;
  _quizTimer = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(_quizTimer); submitQuiz(); return; }
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById('quizTimer').textContent = `Time: ${m}:${s < 10 ? '0' : ''}${s}`;
    if (timeLeft < 60) document.getElementById('quizTimer').style.color = '#c62828';
  }, 1000);
}

async function submitQuiz() {
  if (_quizTimer) clearInterval(_quizTimer);
  const res = await (await fetch(API + '/api/quizzes/' + _pageData.quizId + '/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: currentUser.id, answers: _quizAnswers }) })).json();

    if (e.key === 'c' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); return false; }

window.playOnboardVideo = function(idx) {
  const v = window._onboardVideos[idx];
  if (!v) return;
  const area = document.getElementById('onboardPlayerArea');
  area.style.display = 'block';
  area.innerHTML = `
    <div style="position:relative;border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15);background:#000">
      <div style="position:relative;padding-bottom:50%;height:0;overflow:hidden">
        <iframe id="onboardFrame" src="https://www.youtube.com/embed/${v.youtube_id}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&controls=1&disablekb=1&fs=0&playsinline=1" style="position:absolute;top:-5%;left:0;width:100%;height:112%;border:0" allow="autoplay; encrypted-media; gyroscope"></iframe>
        <div style="position:absolute;top:0;left:0;right:0;height:8%;background:#000;z-index:11;pointer-events:none"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:16%;background:#000;z-index:11;pointer-events:none"></div>
      </div>
      <div style="background:#1a1a1a;padding:8px 12px;display:flex;align-items:center;gap:8px;justify-content:center">
        <button onclick="onboardSkip(-10)" style="background:#333;color:#fff;border:none;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px" title="Rewind 10s">&#8634; 10s</button>
        <button id="onboardPlayBtn" onclick="onboardTogglePlay()" style="background:#1a237e;color:#fff;border:none;border-radius:4px;padding:5px 16px;cursor:pointer;font-size:12px;font-weight:600">&#9654; Play</button>
        <button onclick="onboardSkip(10)" style="background:#333;color:#fff;border:none;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px" title="Forward 10s">10s &#8635;</button>
        <span id="onboardTimeLabel" style="color:#aaa;font-size:11px;margin-left:6px">0:00 / 0:00</span>
      </div>
      <div style="background:#111;padding:4px 12px;text-align:center"><span style="color:#888;font-size:10px">${v.title}</span></div>
    </div>`;
  area.scrollIntoView({ behavior: 'smooth' });

  let totalDuration = 0, currentTime = 0, isPlaying = false;

  function ytPostMsg(func, args) {
    const f = document.getElementById('onboardFrame');
    if (f && f.contentWindow) f.contentWindow.postMessage(JSON.stringify({ event: 'command', func: func, args: args || [] }), '*');
  }

  window.onboardTogglePlay = function() {
    if (isPlaying) ytPostMsg('pauseVideo'); else ytPostMsg('playVideo');
  };
  window.onboardSkip = function(seconds) {
    ytPostMsg('seekTo', [(currentTime || 0) + seconds, true]);
  };
  function updatePlayBtn() {
    const btn = document.getElementById('onboardPlayBtn');
    if (btn) btn.innerHTML = isPlaying ? '&#10074;&#10074; Pause' : '&#9654; Play';
  }
  function fmtTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

  window._onboardMsg = function(e) {
    try {
      const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      if (d.event === 'infoDelivery' && d.info) {
        if (d.info.duration) totalDuration = d.info.duration;
        if (d.info.currentTime !== undefined) currentTime = d.info.currentTime;
        if (d.info.playerState === 1) { isPlaying = true; updatePlayBtn(); }
        if (d.info.playerState === 2) { isPlaying = false; updatePlayBtn(); }
        if (d.info.playerState === 0) { isPlaying = false; updatePlayBtn(); }
        const tl = document.getElementById('onboardTimeLabel');
        if (tl && totalDuration > 0) tl.textContent = fmtTime(currentTime) + ' / ' + fmtTime(totalDuration);
      }
    } catch(e) {}
  };
  window.addEventListener('message', window._onboardMsg);

  setTimeout(() => {
    const f = document.getElementById('onboardFrame');
    if (f && f.contentWindow) f.contentWindow.postMessage(JSON.stringify({ event: 'listening', id: 'onboardFrame' }), '*');
  }, 1000);
}

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      deferredPrompt = null;
    });
    return;
  }
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isAndroid = /Android/.test(navigator.userAgent);
  var msg = '';
  if (isIOS) {
    msg = '<b>Install on iPhone:</b><br>1. Tap the <b>Share</b> button (&#8984;)<br>2. Scroll down → <b>Add to Home Screen</b><br>3. Tap <b>Add</b>';
  } else if (isAndroid) {
    msg = '<b>Install on Android:</b><br>1. Tap the <b>3 dots</b> menu (&#8942;)<br>2. Tap <b>Install app</b> or <b>Add to Home Screen</b>';
  } else {
    msg = '<b>Install on your phone:</b><br>1. Open this URL on your phone<br>2. The browser will prompt you to install<br><br>Or tap the <b>Share</b> button → <b>Add to Home Screen</b>';
  }
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:24px;max-width:380px;width:90%;text-align:center;font-size:13px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,0.3)">' + msg + '<br><button onclick="this.closest(\'div[style*=fixed]\').remove()" style="margin-top:16px;background:#4361ee;color:#fff;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-size:13px">OK</button></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
}
window.addEventListener('appinstalled', () => { deferredPrompt = null; });
</script>
